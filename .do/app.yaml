name: africa-water-watch
region: nyc

services:
  - name: backend
    source_dir: /backend
    dockerfile_path: backend/Dockerfile
    dockerfile_target: production
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
    health_check:
      http_path: /health

static_sites:
  - name: frontend
    source_dir: /frontend
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        type: SECRET
