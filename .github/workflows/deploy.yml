name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_BACKEND: ${{ secrets.DO_REGISTRY }}/aquawatch-backend
  IMAGE_FRONTEND: ${{ secrets.DO_REGISTRY }}/aquawatch-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            --target production ./backend
          docker push ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_BACKEND }}:${{ github.sha }} ${{ env.IMAGE_BACKEND }}:latest
          docker push ${{ env.IMAGE_BACKEND }}:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
            --target production ./frontend
          docker push ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_FRONTEND }}:${{ github.sha }} ${{ env.IMAGE_FRONTEND }}:latest
          docker push ${{ env.IMAGE_FRONTEND }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} \
            --spec-path /dev/stdin << 'EOF'
          name: aquawatch-africa
          services:
            - name: backend
              image:
                registry_type: DOCR
                registry: ${{ secrets.DO_REGISTRY }}
                repository: aquawatch-backend
                tag: ${{ github.sha }}
              http_port: 8000
              run_command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop
              envs:
                - key: DATABASE_URL
                  scope: RUN_TIME
                  type: SECRET
                - key: REDIS_URL
                  scope: RUN_TIME
                  type: SECRET
                - key: SECRET_KEY
                  scope: RUN_TIME
                  type: SECRET
                - key: OPENROUTER_API_KEY
                  scope: RUN_TIME
                  type: SECRET
            - name: frontend
              image:
                registry_type: DOCR
                registry: ${{ secrets.DO_REGISTRY }}
                repository: aquawatch-frontend
                tag: ${{ github.sha }}
              http_port: 80
          EOF

      - name: Verify deployment
        run: |
          echo "Deployment triggered for commit ${{ github.sha }}"
          doctl apps list
