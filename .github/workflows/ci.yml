name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: pip install ruff && ruff check app/ --select=E,W,F || true

      - name: Type check with mypy
        run: pip install mypy && mypy app/ --ignore-missing-imports || true

  test-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run unit tests
        run: pytest tests/ -v --tb=short || true
        env:
          DATABASE_URL: "postgresql+asyncpg://aquawatch:changeme@localhost:5432/aquawatch"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "test-secret-key"
          OPENROUTER_API_KEY: "test-key"

  lint-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t aquawatch-backend:${{ github.sha }} ./backend

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ""
